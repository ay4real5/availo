<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Availo Watch & Assist</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; width: 280px; margin: 0; padding: 16px; color: #212529; }
    h1 { font-size: 15px; margin: 0 0 8px; color: #1d70b8; }
    p { font-size: 13px; color: #505a5f; margin: 4px 0; }
    button { width: 100%; padding: 10px; margin-top: 10px; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
    .primary { background: #00703c; color: white; }
    .primary:hover { background: #005a30; }
    .stop { background: #d4351c; color: white; }
    .stop:hover { background: #aa2a16; }
    .hold { background: #ffdd00; color: #0b0c0c; font-weight: bold; }
    .hold:hover { background: #ffcc00; }
    .link { background: none; color: #1d70b8; text-decoration: underline; padding: 0; margin-top: 12px; }
    .status { font-size: 12px; padding: 8px; border-radius: 4px; margin-top: 8px; }
    .status.watching { background: #cce2d8; color: #0b3d24; }
    .status.idle { background: #f3f2f1; color: #505a5f; }
    #detection { display: none; background: #fff7bf; border: 1px solid #ffdd00; padding: 8px; border-radius: 4px; margin-top: 10px; font-size: 13px; }
  </style>
</head>
<body>
  <h1>Availo Watch &amp; Assist</h1>
  <div id="app">Loading…</div>
  <script src="popup.js"></script>
</body>
</html>
