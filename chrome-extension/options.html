<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Availo Watch & Assist — Settings</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; max-width: 420px; margin: 24px; color: #212529; }
    h1 { font-size: 18px; color: #1d70b8; }
    label { display: block; margin-top: 12px; font-size: 13px; font-weight: bold; }
    input { width: 100%; box-sizing: border-box; padding: 8px; margin-top: 4px; border: 1px solid #b1b4b6; border-radius: 4px; }
    button { margin-top: 16px; padding: 8px 16px; background: #1d70b8; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #15598f; }
    #status { margin-top: 12px; font-size: 13px; }
    #signedIn { display: none; }
    #signedIn p { font-size: 13px; }
    a.signout { font-size: 12px; color: #d4351c; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Availo Watch &amp; Assist</h1>

  <div id="signedOut">
    <p style="font-size:13px;color:#505a5f;">Sign in with your Availo account. This extension never books or holds anything on its own — it only watches the DVSA page in your own tab and alerts you.</p>
    <label>Backend URL</label>
    <input id="backendUrl" type="text" value="http://localhost:4000" />
    <label>Email</label>
    <input id="email" type="email" />
    <label>Password</label>
    <input id="password" type="password" />
    <button id="loginBtn">Sign in</button>
    <div id="status"></div>
  </div>

  <div id="signedIn">
    <p>Signed in as <strong id="signedInEmail"></strong></p>
    <p id="prefsSummary" style="color:#505a5f;"></p>
    <p><a class="signout" id="signOut">Sign out</a></p>
  </div>

  <script src="options.js"></script>
</body>
</html>
