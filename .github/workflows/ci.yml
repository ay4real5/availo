name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    env:
      SCRAPER_API_KEY: test-key
      DEV_STORE_PATH: .test-store.json
      DISABLE_SPIKE_DETECTOR: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      # This is an npm workspaces monorepo: the single lockfile lives at the
      # repo root, so install from there (not from ./backend).
      - run: npm ci
        working-directory: ${{ github.workspace }}
      - run: npm run lint
      - run: npm run test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      # Single root lockfile (npm workspaces): install from the repo root.
      - run: npm ci
        working-directory: ${{ github.workspace }}
      - run: npm run build
